<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../style/style_global.css">
        <link rel="stylesheet" href="../style/style_quizz.css">
        <link rel="icon" href="../img_global/EVA BDX LAC logo.png">
        <title>Quizz Lapin Crétin</title>
        <script src="../script/calculateur_resultat.js" defer></script>
    </head>
    <body>
    
        <div class="poster_questions">
            <header class="quiz-page-header">
                <img src="../img_global/LOGO EVA BORDEAUX-LAC VECTORIEL Fond perdu bis-03.png" alt="EVA BDX LAC Logo" class="eva-logo">
                <h1>Le Quizz</h1>
            </header>

            <form id="quiz-form" onsubmit="return false;">
                <!-- Question 1 -->
                <div class="question-block">
                    <h2>1. Ce que tu fais en premier quelque part ?</h2>
                    <div class="options-container">
                        <label class="option-card" for="A1">
                            <input type="radio" id="A1" name="reponse1" value="1" />
                            <span class="option-badge">A</span>
                            <span class="option-text">Tu fonces pour profiter un max</span>
                        </label>
                        <label class="option-card" for="B1">
                            <input type="radio" id="B1" name="reponse1" value="1" />
                            <span class="option-badge">B</span>
                            <span class="option-text">Tu observes mais reste à l'aise</span>
                        </label>
                        <label class="option-card" for="C1">
                            <input type="radio" id="C1" name="reponse1" value="1" />
                            <span class="option-badge">C</span>
                            <span class="option-text">Tu analyses rapidement les alentours</span>
                        </label>
                    </div>
                </div>

                <!-- Question 2 -->
                <div class="question-block">
                    <h2>2. Face à une surprise ?</h2>
                    <div class="options-container">
                        <label class="option-card" for="A2">
                            <input type="radio" id="A2" name="reponse2" value="1" />
                            <span class="option-badge">A</span>
                            <span class="option-text">Tu improvises direct, avancer sans plan ça te connait</span>
                        </label>
                        <label class="option-card" for="B2">
                            <input type="radio" id="B2" name="reponse2" value="1" />
                            <span class="option-badge">B</span>
                            <span class="option-text">Tu te fais surprendre facilement</span>
                        </label>
                        <label class="option-card" for="C2">
                            <input type="radio" id="C2" name="reponse2" value="1" />
                            <span class="option-badge">C</span>
                            <span class="option-text">Tu prends 2 secondes… et tu fonces !</span>
                        </label>
                    </div>
                </div>

                <!-- Question 3 -->
                <div class="question-block">
                    <h2>3. Tu es plutôt ?</h2>
                    <div class="options-container">
                        <label class="option-card" for="A3">
                            <input type="radio" id="A3" name="reponse3" value="1" />
                            <span class="option-badge">A</span>
                            <span class="option-text">Impulsif</span>
                        </label>
                        <label class="option-card" for="B3">
                            <input type="radio" id="B3" name="reponse3" value="1" />
                            <span class="option-badge">B</span>
                            <span class="option-text">Passionné</span>
                        </label>
                        <label class="option-card" for="C3">
                            <input type="radio" id="C3" name="reponse3" value="1" />
                            <span class="option-badge">C</span>
                            <span class="option-text">Organisé</span>
                        </label>
                    </div>
                </div>

                <!-- Question 4 -->
                <div class="question-block">
                    <h2>4. Les Lapins Crétins ?</h2>
                    <div class="options-container">
                        <label class="option-card" for="A4">
                            <input type="radio" id="A4" name="reponse4" value="1" />
                            <span class="option-badge">A</span>
                            <span class="option-text">Jamais entendu</span>
                        </label>
                        <label class="option-card" for="B4">
                            <input type="radio" id="B4" name="reponse4" value="1" />
                            <span class="option-badge">B</span>
                            <span class="option-text">Je regarde</span>
                        </label>
                        <label class="option-card" for="C4">
                            <input type="radio" id="C4" name="reponse4" value="1" />
                            <span class="option-badge">C</span>
                            <span class="option-text">Je les étudie</span>
                        </label>
                    </div>
                </div>

                <!-- Question 5 -->
                <div class="question-block">
                    <h2>5. Ce que tu préfères ?</h2>
                    <div class="options-container">
                        <label class="option-card" for="A5">
                            <input type="radio" id="A5" name="reponse5" value="1" />
                            <span class="option-badge">A</span>
                            <span class="option-text">Les surprises</span>
                        </label>
                        <label class="option-card" for="B5">
                            <input type="radio" id="B5" name="reponse5" value="1" />
                            <span class="option-badge">B</span>
                            <span class="option-text">La passion</span>
                        </label>
                        <label class="option-card" for="C5">
                            <input type="radio" id="C5" name="reponse5" value="1" />
                            <span class="option-badge">C</span>
                            <span class="option-text">L'organisation</span>
                        </label>
                    </div>
                </div>

                <!-- Question 6 -->
                <div class="question-block">
                    <h2>6. Tu rencontres un lapin crétin ?</h2>
                    <div class="options-container">
                        <label class="option-card" for="A6">
                            <input type="radio" id="A6" name="reponse6" value="1" />
                            <span class="option-badge">A</span>
                            <span class="option-text">Tu cours avec lui dans la ville</span>
                        </label>
                        <label class="option-card" for="B6">
                            <input type="radio" id="B6" name="reponse6" value="1" />
                            <span class="option-badge">B</span>
                            <span class="option-text">Tu tentes de communiquer</span>
                        </label>
                        <label class="option-card" for="C6">
                            <input type="radio" id="C6" name="reponse6" value="1" />
                            <span class="option-badge">C</span>
                            <span class="option-text">Tu l'étudies de loin </span>
                        </label>
                    </div>
                </div>

                <!-- Question 7 -->
                <div class="question-block">
                    <h2>7. Tu trouves un caddie abandonné ?</h2>
                    <div class="options-container">
                        <label class="option-card" for="A7">
                            <input type="radio" id="A7" name="reponse7" value="1" />
                            <span class="option-badge">A</span>
                            <span class="option-text">Tu montes dedans en criant “BWAAAH !”</span>
                        </label>
                        <label class="option-card" for="B7">
                            <input type="radio" id="B7" name="reponse7" value="1" />
                            <span class="option-badge">B</span>
                            <span class="option-text">Tu le transforme en vaisseau spatial</span>
                        </label>
                        <label class="option-card" for="C7">
                            <input type="radio" id="C7" name="reponse7" value="1" />
                            <span class="option-badge">C</span>
                            <span class="option-text">Tu réfléchis à qui a bien pu le laisser en plein milieu d'un désert</span>
                        </label>
                    </div>
                </div>
            </form>

            <footer class="quiz-footer">
                <button class="bouton_resultat" onclick="CalculResultatQuizz()">Voir mon résultat</button>
                <div class="footer-links">
                    <a href="../index.html">Accueil</a>
                    <a href="../credits.html">Crédits</a>
                </div>
            </footer>
        </div>

    </body>
</html>
